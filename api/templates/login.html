<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Gerador de Vídeos</title>
  <link rel="stylesheet" href="/static/css/estilo.css">
</head>
<body>
  <main style="max-width: 360px; margin-top: 4rem;">
    <h1 style="margin-bottom: 1.5rem;">Gerador de Vídeos</h1>

    {% if erro %}
    <p class="aviso erro">{{ erro }}</p>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label>
        <span class="rotulo">Usuário</span>
        <input type="text" name="usuario" autocomplete="username" autofocus required>
      </label>
      <label>
        <span class="rotulo">Senha</span>
        <input type="password" name="senha" autocomplete="current-password" required>
      </label>
      <button type="submit" style="margin-top: 0.5rem;">Entrar</button>
    </form>
  </main>
</body>
</html>
